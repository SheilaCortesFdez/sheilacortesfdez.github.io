name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Si tu sitio necesita build, añade aquí los pasos de build antes del upload.
      # Ejemplo Node:
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '18'
      # - run: npm ci && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: .    # cambia a ./build si tu sitio se genera ahí

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
