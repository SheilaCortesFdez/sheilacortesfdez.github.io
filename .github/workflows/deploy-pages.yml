name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

# Permisos recomendados
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Si necesitas un build (npm, hugo, etc.) añádelo aquí.
      # Ejemplo para Node:
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '18'
      # - run: npm ci && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: .    # publica la raíz; cámbialo a ./build si tu sitio se genera en otra carpeta

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
