name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Si necesitas ejecutar un build (npm, hugo, etc.), añádelo aquí.
      # Ejemplo para Node:
      # - name: Install & build
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '18'
      # - run: npm ci && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: .    # publica la raíz; cámbialo a ./build si tu sitio se genera en otra carpeta

  deploy:
    needs: build
    uses: actions/deploy-pages@v1
